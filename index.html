<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curing Oven Controller</title>
    <link rel="manifest" href="manifest.json">
    <link rel="stylesheet" href="styles.css">
    <meta name="theme-color" content="#1e2937">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
    <div class="container">
        <header>
            <h1>Curing Oven</h1>
            <div id="connection-status" class="status idle">Disconnected</div>
        </header>

        <!-- Live Temperature -->
        <section class="temp-section">
            <div class="temp-label">Current Temperature</div>
            <div class="temp-display">
                <span id="current-temp">28.0</span>
                <span class="temp-unit">°C</span>
            </div>
            <div class="status-bar">
                <span id="current-mode">IDLE</span>
            </div>
            <div id="heater-status">Heater: OFF</div>
            <div id="fan-status">Fan: OFF</div>
        </section>

        <!-- Controls -->
        <section class="controls">
            <button id="connect-btn" class="btn primary">🔗 Connect to Oven (BLE)</button>
            <button id="full-power-btn" class="btn warning">🔥 Full Power Test</button>
            <button id="emergency-stop" class="btn danger">⛔ EMERGENCY STOP</button>
        </section>

        <!-- Annealing Program -->
        <section class="program-section">
            <h2>Annealing Program</h2>
            <div class="form-grid">
                <label>Target Temp (°C)</label>
                <input type="number" id="target-temp" value="95" min="50" max="250">
                <label>Ramp Rate (°C/min)</label>
                <input type="number" id="ramp-rate" value="5" min="1" max="20">
                <label>Hold Time (min)</label>
                <input type="number" id="hold-time" value="30" min="1" max="240">
                <label>Cool-down Rate (°C/min)</label>
                <input type="number" id="cool-rate" value="3" min="1" max="20">
            </div>
            <button id="start-program" class="btn success">▶ Start Annealing Cycle</button>
        </section>

        <!-- Live Graph -->
        <section class="graph-section">
            <h3>Annealing Progress</h3>
            <canvas id="temp-graph" width="600" height="300"></canvas>
            <button id="view-history" class="btn secondary" style="margin-top: 10px;">View Past Cycles</button>
        </section>

        <!-- Activity Log -->
        <section class="log-section">
            <h3>Activity Log</h3>
            <div id="log" class="log"></div>
        </section>
    </div>

    <script src="app.js"></script>
</body>
</html>
